name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (e.g. 1.0.0 or 1.0.0-beta.1)'
        required: true
      npm_tag:
        description: 'npm dist-tag'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest
          - next
          - beta

concurrency:
  group: release

permissions:
  contents: write
  id-token: write   # npm Trusted Publishing(OIDC),免 NPM_TOKEN

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # 完整 history,changelog 需要

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test

      - name: Bump version
        # 幂等:package.json 已是目标版本时跳过(npm version 对"版本没变"会报错)
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "package.json already at $VERSION, skip bump"
          else
            pnpm version "$VERSION" --no-git-tag-version
          fi

      - name: Build
        run: pnpm build

      - name: Generate changelog
        run: pnpm dlx conventional-changelog-cli@latest -p angular -i CHANGELOG.md -s -r 1

      - name: Commit and tag
        # 有变更才提交(bump 被跳过时可能只有 changelog、甚至无变更);tag 始终打
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add package.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "chore(release): v$VERSION"
          fi
          git tag -a "v$VERSION" -m "v$VERSION"

      - name: Publish to npm
        # 走 OIDC Trusted Publishing:需 npm 包设置里登记本仓库/workflow 为 Trusted Publisher,
        # 之后无需任何 NPM_TOKEN secret(id-token: write 权限见顶部 permissions)
        run: pnpm publish --no-git-checks --access public --tag "${{ inputs.npm_tag }}"

      - name: Push commit and tag
        run: git push --follow-tags
